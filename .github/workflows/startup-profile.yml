name: Startup Profile

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'What this run is testing (shown in summary)'
        default: 'baseline'
      luceeVersion:
        description: 'Lucee version from update server (e.g. 7.1/snapshot, 7.0/snapshot). Leave empty to use local JAR.'
        default: ''
      parallelism:
        description: 'Felix resolver parallelism (comma-sep for multiple, e.g. 4,8,16)'
        default: '4'
      runs:
        description: 'Runs per config (run 1 = cold deploy, run 2+ = warm starts)'
        default: '5'
      jfr:
        description: 'Enable JFR recording (disable for faster runs, duration-only)'
        type: boolean
        default: true

jobs:
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        jar:
          - name: lucee-7.2.0.51-ALPHA
            file: jars/lucee-7.2.0.51-ALPHA.jar
          - name: lucee-7.2.0.51-ALPHA-baseline
            file: jars/lucee-7.2.0.51-ALPHA-baseline.jar
        java: ['21', '25']
        skipExtensions: [false, true]
    name: "${{ matrix.jar.name }} java${{ matrix.java }} ext=${{ !matrix.skipExtensions }}"
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: '${{ matrix.java }}'
          distribution: 'temurin'

      - name: Checkout script-runner
        uses: actions/checkout@v6
        with:
          repository: lucee/script-runner
          path: script-runner

      - name: Resolve JAR
        id: jar
        shell: bash
        run: |
          if [ -n "${{ inputs.luceeVersion }}" ]; then
            echo "mode=version" >> "$GITHUB_OUTPUT"
            echo "name=${{ inputs.luceeVersion }}" >> "$GITHUB_OUTPUT"
            echo "Using published version: ${{ inputs.luceeVersion }}"
          else
            echo "mode=local" >> "$GITHUB_OUTPUT"
            echo "name=${{ matrix.jar.name }}" >> "$GITHUB_OUTPUT"
            echo "jar=$GITHUB_WORKSPACE/${{ matrix.jar.file }}" >> "$GITHUB_OUTPUT"
            echo "Using local JAR: ${{ matrix.jar.file }}"
          fi

      - name: Run startup profiles
        shell: bash
        run: |
          LABEL="${{ steps.jar.outputs.name }}-java${{ matrix.java }}-ext${{ !matrix.skipExtensions }}"
          RESULTS="$GITHUB_WORKSPACE/results/$LABEL"
          mkdir -p "$RESULTS"

          # Build ant args for JAR source
          if [ "${{ steps.jar.outputs.mode }}" = "version" ]; then
            JAR_ARG="-DluceeVersion=${{ inputs.luceeVersion }}"
            echo "Version: ${{ inputs.luceeVersion }}"
          else
            JAR_ARG="-DluceeJar=${{ steps.jar.outputs.jar }}"
            echo "JAR: ${{ steps.jar.outputs.jar }} ($(ls -lh "${{ steps.jar.outputs.jar }}" | awk '{print $5}'))"
          fi
          echo "Java: ${{ matrix.java }}"
          echo "Skip extensions: ${{ matrix.skipExtensions }}"
          echo "Cores: $(nproc)"
          echo ""

          IFS=',' read -ra PARALLELISM_VALUES <<< "${{ inputs.parallelism }}"

          for P in "${PARALLELISM_VALUES[@]}"; do
            P=$(echo "$P" | tr -d ' ')
            echo ""
            echo "=== Parallelism: $P ==="
            mkdir -p "$RESULTS/p$P"

            for R in $(seq 1 ${{ inputs.runs }}); do
              echo "--- p$P run $R ---"

              export FELIX_RESOLVER_PARALLELISM="$P"
              export FELIX_SYSTEMBUNDLE_ACTIVATORS_START_PARALLELISM="$P"
              if [ "${{ matrix.skipExtensions }}" = "true" ]; then
                export LUCEE_EXTENSIONS_INSTALL=false
              fi

              # Run 1 = cold deploy (postCleanup=false to keep deploy for warm runs)
              # Run 2+ = warm start (reuse existing deploy)
              if [ "$R" -eq 1 ]; then
                CLEANUP="true"
                POST_CLEANUP="false"
              else
                CLEANUP="false"
                POST_CLEANUP="false"
              fi
              # Last run cleans up
              if [ "$R" -eq ${{ inputs.runs }} ]; then
                POST_CLEANUP="true"
              fi

              START_NS=$(date +%s%N)

              # JFR args (conditional)
              JFR_ARGS=""
              if [ "${{ inputs.jfr }}" = "true" ]; then
                JFR_ARGS="-DFlightRecording=true -DFlightRecordingSettings=$GITHUB_WORKSPACE/jfc-startup.jfc -DFlightRecordingFilename=$RESULTS/p$P/run$R.jfr"
              fi

              ant -buildfile "$GITHUB_WORKSPACE/script-runner" \
                -Dwebroot="$GITHUB_WORKSPACE" \
                -Dexecute="/hello.cfm" \
                -Ddebugger="false" \
                $JFR_ARGS \
                -Dcleanup="$CLEANUP" \
                -DpostCleanup="$POST_CLEANUP" \
                $JAR_ARG \
                > "$RESULTS/p$P/run$R.txt" 2>&1

              END_NS=$(date +%s%N)
              ELAPSED_MS=$(( (END_NS - START_NS) / 1000000 ))
              echo "$ELAPSED_MS" > "$RESULTS/p$P/run$R.ms"

              # Tag as cold or warm
              if [ "$R" -eq 1 ]; then
                echo "cold" > "$RESULTS/p$P/run$R.type"
              else
                echo "warm" > "$RESULTS/p$P/run$R.type"
              fi
              echo "  ${ELAPSED_MS}ms ($(cat "$RESULTS/p$P/run$R.type"))  JFR: $(ls -lh "$RESULTS/p$P/run$R.jfr" 2>/dev/null | awk '{print $5}')"
            done
          done

      - name: Extract metrics
        shell: bash
        run: |
          LABEL="${{ steps.jar.outputs.name }}-java${{ matrix.java }}-ext${{ !matrix.skipExtensions }}"
          RESULTS="$GITHUB_WORKSPACE/results/$LABEL"

          IFS=',' read -ra PARALLELISM_VALUES <<< "${{ inputs.parallelism }}"

          SUMMARY="$RESULTS/summary.md"
          echo "# ${{ steps.jar.outputs.name }} — Java ${{ matrix.java }}, extensions=${{ !matrix.skipExtensions }}" > "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "**Description:** ${{ inputs.description }}" >> "$SUMMARY"
          echo "**Java:** $(java -version 2>&1 | head -1)" >> "$SUMMARY"
          echo "**Runner:** $(nproc) cores" >> "$SUMMARY"
          echo "**Parallelism:** ${{ inputs.parallelism }}" >> "$SUMMARY"
          echo "**Runs:** ${{ inputs.runs }} (run 1 = cold deploy, run 2+ = warm start)" >> "$SUMMARY"
          echo "**JFR:** ${{ inputs.jfr }}" >> "$SUMMARY"
          echo "" >> "$SUMMARY"

          if [ "${{ inputs.jfr }}" = "true" ]; then
            echo "| Parallelism | Run | Type | Duration (ms) | Threads | Contention (ms) | SecureRandom (ms) | GC count | GC pause (ms) | Classes |" >> "$SUMMARY"
            echo "|---|---|---|---|---|---|---|---|---|---|" >> "$SUMMARY"
          else
            echo "| Parallelism | Run | Type | Duration (ms) |" >> "$SUMMARY"
            echo "|---|---|---|---|" >> "$SUMMARY"
          fi

          for P in "${PARALLELISM_VALUES[@]}"; do
            P=$(echo "$P" | tr -d ' ')
            for R in $(seq 1 ${{ inputs.runs }}); do
              DURATION=$(cat "$RESULTS/p$P/run$R.ms" 2>/dev/null || echo "?")
              TYPE=$(cat "$RESULTS/p$P/run$R.type" 2>/dev/null || echo "?")

              if [ "${{ inputs.jfr }}" = "true" ]; then
                JFR="$RESULTS/p$P/run$R.jfr"
                if [ ! -f "$JFR" ]; then
                  echo "MISSING: $JFR"
                  continue
                fi
                THREADS=$(jfr summary "$JFR" 2>&1 | awk '/jdk.ThreadStart /{print $2}')
                CONTENTION=$(jfr print --events jdk.JavaMonitorEnter "$JFR" 2>&1 \
                  | awk -F'= ' '/duration =/{gsub(/ ms/,"",$2); sum+=$2} END{printf "%.0f", sum}')
                SR=$(jfr print --events jdk.JavaMonitorEnter "$JFR" 2>&1 \
                  | awk -F'= ' '/monitorClass =/{mc=$2} /duration =/{d=$2} /eventThread =/{if(mc ~ /HashDrbg/) {gsub(/ ms/,"",d); sum+=d}} END{printf "%.0f", sum}')
                GC_COUNT=$(jfr summary "$JFR" 2>&1 | awk '/jdk.GarbageCollection /{print $2}')
                GC_PAUSE=$(jfr print --events jdk.GCPhasePause "$JFR" 2>&1 \
                  | awk -F'= ' '/duration =/{gsub(/ ms/,"",$2); sum+=$2} END{printf "%.1f", sum}')
                CLASSES=$(jfr summary "$JFR" 2>&1 | awk '/jdk.ClassLoad /{print $2}')
                echo "| $P | $R | $TYPE | $DURATION | $THREADS | $CONTENTION | $SR | $GC_COUNT | $GC_PAUSE | $CLASSES |" >> "$SUMMARY"
              else
                echo "| $P | $R | $TYPE | $DURATION |" >> "$SUMMARY"
              fi
            done
          done

          echo "" >> "$SUMMARY"
          cat "$SUMMARY"

      - name: Post summary
        shell: bash
        run: |
          LABEL="${{ steps.jar.outputs.name }}-java${{ matrix.java }}-ext${{ !matrix.skipExtensions }}"
          cat "$GITHUB_WORKSPACE/results/$LABEL/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Write metrics CSV
        shell: bash
        run: |
          LABEL="${{ steps.jar.outputs.name }}-java${{ matrix.java }}-ext${{ !matrix.skipExtensions }}"
          RESULTS="$GITHUB_WORKSPACE/results/$LABEL"
          CSV="$RESULTS/metrics.csv"

          IFS=',' read -ra PARALLELISM_VALUES <<< "${{ inputs.parallelism }}"

          for P in "${PARALLELISM_VALUES[@]}"; do
            P=$(echo "$P" | tr -d ' ')
            for R in $(seq 1 ${{ inputs.runs }}); do
              DUR=$(cat "$RESULTS/p$P/run$R.ms" 2>/dev/null || echo 0)
              TYPE=$(cat "$RESULTS/p$P/run$R.type" 2>/dev/null || echo "?")
              CONT=0; GC_CNT=0; GC_PAUSE=0
              if [ "${{ inputs.jfr }}" = "true" ]; then
                JFR="$RESULTS/p$P/run$R.jfr"
                [ -f "$JFR" ] && {
                  CONT=$(jfr print --events jdk.JavaMonitorEnter "$JFR" 2>&1 \
                    | awk -F'= ' '/duration =/{gsub(/ ms/,"",$2); sum+=$2} END{printf "%.0f", sum}')
                  GC_CNT=$(jfr summary "$JFR" 2>&1 | awk '/jdk.GarbageCollection /{print $2}')
                  GC_PAUSE=$(jfr print --events jdk.GCPhasePause "$JFR" 2>&1 \
                    | awk -F'= ' '/duration =/{gsub(/ ms/,"",$2); sum+=$2} END{printf "%.1f", sum}')
                }
              fi
              # CSV: jar,java,ext,parallelism,run,type,duration,contention,gc_count,gc_pause
              echo "${{ steps.jar.outputs.name }},${{ matrix.java }},${{ !matrix.skipExtensions }},$P,$R,$TYPE,$DUR,$CONT,${GC_CNT:-0},${GC_PAUSE:-0}" >> "$CSV"
            done
          done

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: "startup-profile-${{ steps.jar.outputs.name }}-java${{ matrix.java }}-ext${{ !matrix.skipExtensions }}"
          path: results/

  compare:
    runs-on: ubuntu-latest
    needs: profile
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: startup-profile-*
          merge-multiple: true

      - name: Build comparison
        shell: bash
        run: |
          # Collect all CSV files
          # CSV: jar,java,ext,parallelism,run,type,duration,contention,gc_count,gc_pause
          cat $(find . -name "metrics.csv") > all.csv

          SUMMARY="comparison.md"
          echo "# Startup Profile Comparison" > "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "**Description:** ${{ inputs.description }}" >> "$SUMMARY"
          echo "**Parallelism:** ${{ inputs.parallelism }}" >> "$SUMMARY"
          echo "**Runs:** ${{ inputs.runs }} (run 1 = cold deploy, run 2+ = warm start)" >> "$SUMMARY"
          echo "" >> "$SUMMARY"

          # Generate tables for cold and warm separately
          for START_TYPE in cold warm; do
            echo "## ${START_TYPE^} Start" >> "$SUMMARY"
            echo "" >> "$SUMMARY"

            if [ "$START_TYPE" = "cold" ]; then
              echo "_Run 1 only — includes deploy, bundle resolution, extension install_" >> "$SUMMARY"
            else
              echo "_Runs 2+ averaged — deploy already in place, measures pure startup_" >> "$SUMMARY"
            fi
            echo "" >> "$SUMMARY"

            # Check if we have JFR data (any non-zero contention/gc values)
            HAS_JFR=$(awk -F',' '$8 > 0 || $9 > 0 {found=1; exit} END{print found+0}' all.csv)

            if [ "$HAS_JFR" = "1" ]; then
              echo "| Java | Extensions | JAR | Avg Duration (ms) | Dur Δ | Avg Contention (ms) | Cont Δ | Avg GC Count | GC Δ | Avg GC Pause (ms) | Pause Δ |" >> "$SUMMARY"
              echo "|---|---|---|---|---|---|---|---|---|---|---|" >> "$SUMMARY"
            else
              echo "| Java | Extensions | JAR | Avg Duration (ms) | Dur Δ |" >> "$SUMMARY"
              echo "|---|---|---|---|---|" >> "$SUMMARY"
            fi

            # Calculate averages per config, filtered by type
            awk -F',' -v stype="$START_TYPE" '
            $6 == stype {
              key = $2 SUBSEP $3 SUBSEP $1
              dur[key] += $7
              cont[key] += $8
              gc_cnt[key] += $9
              gc_pause[key] += $10
              count[key]++
            }
            END {
              for (k in dur) {
                split(k, a, SUBSEP)
                java = a[1]; ext = a[2]; jar = a[3]
                printf "%s,%s,%s,%.0f,%.0f,%.0f,%.1f\n", java, ext, jar, dur[k]/count[k], cont[k]/count[k], gc_cnt[k]/count[k], gc_pause[k]/count[k]
              }
            }' all.csv | sort > "averages-${START_TYPE}.csv"

            # Pair patched vs baseline and compute deltas
            while IFS=',' read -r java ext jar avg_dur avg_cont avg_gc_cnt avg_gc_pause; do
              if [[ "$jar" == *baseline* ]]; then
                continue
              fi
              base_jar=$(echo "$jar" | sed 's/$/-baseline/')
              base_line=$(grep "^$java,$ext,$base_jar," "averages-${START_TYPE}.csv" || echo "")
              if [ -n "$base_line" ]; then
                base_dur=$(echo "$base_line" | cut -d',' -f4)
                base_cont=$(echo "$base_line" | cut -d',' -f5)
                base_gc_cnt=$(echo "$base_line" | cut -d',' -f6)
                base_gc_pause=$(echo "$base_line" | cut -d',' -f7)
                dur_delta=$(awk "BEGIN{if($base_dur>0) printf \"%+.0f%%\", ($avg_dur - $base_dur) / $base_dur * 100; else print \"—\"}")
                cont_delta=$(awk "BEGIN{if($base_cont>0) printf \"%+.0f%%\", ($avg_cont - $base_cont) / $base_cont * 100; else print \"—\"}")
                gc_cnt_delta=$(awk "BEGIN{if($base_gc_cnt>0) printf \"%+.0f%%\", ($avg_gc_cnt - $base_gc_cnt) / $base_gc_cnt * 100; else print \"—\"}")
                gc_pause_delta=$(awk "BEGIN{if($base_gc_pause>0) printf \"%+.0f%%\", ($avg_gc_pause - $base_gc_pause) / $base_gc_pause * 100; else print \"—\"}")
              else
                base_dur="?"; base_cont="?"; base_gc_cnt="?"; base_gc_pause="?"
                dur_delta="?"; cont_delta="?"; gc_cnt_delta="?"; gc_pause_delta="?"
              fi
              ext_label="yes"
              [ "$ext" = "false" ] && ext_label="no"
              if [ "$HAS_JFR" = "1" ]; then
                echo "| $java | $ext_label | **patched** | **$avg_dur** | | **$avg_cont** | | **$avg_gc_cnt** | | **$avg_gc_pause** | |" >> "$SUMMARY"
                echo "| $java | $ext_label | baseline | $base_dur | $dur_delta | $base_cont | $cont_delta | $base_gc_cnt | $gc_cnt_delta | $base_gc_pause | $gc_pause_delta |" >> "$SUMMARY"
              else
                echo "| $java | $ext_label | **patched** | **$avg_dur** | |" >> "$SUMMARY"
                echo "| $java | $ext_label | baseline | $base_dur | $dur_delta |" >> "$SUMMARY"
              fi
            done < <(grep -v "baseline" "averages-${START_TYPE}.csv" | sort)

            echo "" >> "$SUMMARY"
          done

          cat "$SUMMARY"

      - name: Post comparison
        shell: bash
        run: cat comparison.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload comparison
        uses: actions/upload-artifact@v7
        with:
          name: startup-profile-comparison
          path: comparison.md
