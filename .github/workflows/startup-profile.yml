name: Startup Profile

on:
  workflow_dispatch:
    inputs:
      description:
        description: 'What this run is testing (shown in summary)'
        default: 'baseline'
      luceeVersion:
        description: 'Lucee version from update server (e.g. 7.1/snapshot, 7.0/snapshot). Leave empty to use local JAR.'
        default: ''
      java:
        description: 'Java version'
        default: '21'
      parallelism:
        description: 'Felix resolver parallelism (comma-sep for multiple, e.g. 4,8,16)'
        default: '4,8,16'
      runs:
        description: 'Runs per config'
        default: '3'

jobs:
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        jar:
          - name: lucee-7.2.0.51-ALPHA
            file: jars/lucee-7.2.0.51-ALPHA.jar
          - name: lucee-7.2.0.51-ALPHA-baseline
            file: jars/lucee-7.2.0.51-ALPHA-baseline.jar
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up JDK ${{ inputs.java }}
        uses: actions/setup-java@v5
        with:
          java-version: '${{ inputs.java }}'
          distribution: 'temurin'

      - name: Checkout script-runner
        uses: actions/checkout@v6
        with:
          repository: lucee/script-runner
          path: script-runner

      - name: Resolve JAR
        id: jar
        shell: bash
        run: |
          if [ -n "${{ inputs.luceeVersion }}" ]; then
            echo "mode=version" >> "$GITHUB_OUTPUT"
            echo "name=${{ inputs.luceeVersion }}" >> "$GITHUB_OUTPUT"
            echo "Using published version: ${{ inputs.luceeVersion }}"
          else
            echo "mode=local" >> "$GITHUB_OUTPUT"
            echo "name=${{ matrix.jar.name }}" >> "$GITHUB_OUTPUT"
            echo "jar=$GITHUB_WORKSPACE/${{ matrix.jar.file }}" >> "$GITHUB_OUTPUT"
            echo "Using local JAR: ${{ matrix.jar.file }}"
          fi

      - name: Run startup profiles
        shell: bash
        run: |
          RESULTS="$GITHUB_WORKSPACE/results/${{ steps.jar.outputs.name }}"
          mkdir -p "$RESULTS"

          # Build ant args for JAR source
          if [ "${{ steps.jar.outputs.mode }}" = "version" ]; then
            JAR_ARG="-DluceeVersion=${{ inputs.luceeVersion }}"
            echo "Version: ${{ inputs.luceeVersion }}"
          else
            JAR_ARG="-DluceeJar=${{ steps.jar.outputs.jar }}"
            echo "JAR: ${{ steps.jar.outputs.jar }} ($(ls -lh "${{ steps.jar.outputs.jar }}" | awk '{print $5}'))"
          fi
          echo "Cores: $(nproc)"
          echo ""

          IFS=',' read -ra PARALLELISM_VALUES <<< "${{ inputs.parallelism }}"

          for P in "${PARALLELISM_VALUES[@]}"; do
            P=$(echo "$P" | tr -d ' ')
            echo ""
            echo "=== Parallelism: $P ==="
            mkdir -p "$RESULTS/p$P"

            for R in $(seq 1 ${{ inputs.runs }}); do
              echo "--- p$P run $R ---"

              export FELIX_RESOLVER_PARALLELISM="$P"
              export FELIX_SYSTEMBUNDLE_ACTIVATORS_START_PARALLELISM="$P"

              START_NS=$(date +%s%N)

              ant -buildfile "$GITHUB_WORKSPACE/script-runner" \
                -Dwebroot="$GITHUB_WORKSPACE" \
                -Dexecute="/hello.cfm" \
                -Ddebugger="false" \
                -DFlightRecording="true" \
                -DFlightRecordingSettings="$GITHUB_WORKSPACE/jfc-startup.jfc" \
                -DFlightRecordingFilename="$RESULTS/p$P/run$R.jfr" \
                -DpostCleanup="true" \
                $JAR_ARG \
                > "$RESULTS/p$P/run$R.txt" 2>&1

              END_NS=$(date +%s%N)
              ELAPSED_MS=$(( (END_NS - START_NS) / 1000000 ))
              echo "$ELAPSED_MS" > "$RESULTS/p$P/run$R.ms"
              echo "  ${ELAPSED_MS}ms  JFR: $(ls -lh "$RESULTS/p$P/run$R.jfr" 2>/dev/null | awk '{print $5}')"
            done
          done

      - name: Extract metrics
        shell: bash
        run: |
          RESULTS="$GITHUB_WORKSPACE/results/${{ steps.jar.outputs.name }}"

          IFS=',' read -ra PARALLELISM_VALUES <<< "${{ inputs.parallelism }}"

          SUMMARY="$RESULTS/summary.md"
          echo "# Startup Profile: ${{ steps.jar.outputs.name }}" > "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "**Description:** ${{ inputs.description }}" >> "$SUMMARY"
          echo "**JAR:** ${{ steps.jar.outputs.name }}" >> "$SUMMARY"
          echo "**Java:** $(java -version 2>&1 | head -1)" >> "$SUMMARY"
          echo "**Runner:** $(nproc) cores" >> "$SUMMARY"
          echo "**Parallelism:** ${{ inputs.parallelism }}" >> "$SUMMARY"
          echo "**Runs:** ${{ inputs.runs }}" >> "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "| Parallelism | Run | Duration (ms) | Threads | Contention (ms) | SecureRandom (ms) | GC count | GC pause (ms) | Classes |" >> "$SUMMARY"
          echo "|---|---|---|---|---|---|---|---|---|" >> "$SUMMARY"

          for P in "${PARALLELISM_VALUES[@]}"; do
            P=$(echo "$P" | tr -d ' ')
            for R in $(seq 1 ${{ inputs.runs }}); do
              JFR="$RESULTS/p$P/run$R.jfr"
              if [ ! -f "$JFR" ]; then
                echo "MISSING: $JFR"
                continue
              fi

              DURATION=$(cat "$RESULTS/p$P/run$R.ms" 2>/dev/null || echo "?")
              THREADS=$(jfr summary "$JFR" 2>&1 | awk '/jdk.ThreadStart /{print $2}')
              CONTENTION=$(jfr print --events jdk.JavaMonitorEnter "$JFR" 2>&1 \
                | awk -F'= ' '/duration =/{gsub(/ ms/,"",$2); sum+=$2} END{printf "%.0f", sum}')
              SR=$(jfr print --events jdk.JavaMonitorEnter "$JFR" 2>&1 \
                | awk -F'= ' '/monitorClass =/{mc=$2} /duration =/{d=$2} /eventThread =/{if(mc ~ /HashDrbg/) {gsub(/ ms/,"",d); sum+=d}} END{printf "%.0f", sum}')
              GC_COUNT=$(jfr summary "$JFR" 2>&1 | awk '/jdk.GarbageCollection /{print $2}')
              GC_PAUSE=$(jfr print --events jdk.GCPhasePause "$JFR" 2>&1 \
                | awk -F'= ' '/duration =/{gsub(/ ms/,"",$2); sum+=$2} END{printf "%.1f", sum}')
              CLASSES=$(jfr summary "$JFR" 2>&1 | awk '/jdk.ClassLoad /{print $2}')

              echo "| $P | $R | $DURATION | $THREADS | $CONTENTION | $SR | $GC_COUNT | $GC_PAUSE | $CLASSES |" >> "$SUMMARY"
            done
          done

          echo "" >> "$SUMMARY"
          cat "$SUMMARY"

      - name: Post summary
        shell: bash
        run: cat "$GITHUB_WORKSPACE/results/${{ steps.jar.outputs.name }}/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: startup-profile-${{ steps.jar.outputs.name }}
          path: results/
