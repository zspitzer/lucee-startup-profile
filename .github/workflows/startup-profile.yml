name: Startup Profile

on:
  workflow_dispatch:
    inputs:
      parallelism:
        description: 'Felix resolver parallelism (comma-sep for multiple, e.g. 4,8,16)'
        default: '4,8,16'
      runs:
        description: 'Runs per config'
        default: '3'

jobs:
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        jar:
          - name: lucee-7.2.0.51-ALPHA
            file: jars/lucee-7.2.0.51-ALPHA.jar
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Checkout script-runner
        uses: actions/checkout@v6
        with:
          repository: lucee/script-runner
          path: script-runner

      - name: Run startup profiles
        shell: bash
        run: |
          JAR="$GITHUB_WORKSPACE/${{ matrix.jar.file }}"
          RESULTS="$GITHUB_WORKSPACE/results/${{ matrix.jar.name }}"
          mkdir -p "$RESULTS"

          echo "JAR: $JAR ($(ls -lh "$JAR" | awk '{print $5}'))"
          echo "Cores: $(nproc)"
          echo ""

          IFS=',' read -ra PARALLELISM_VALUES <<< "${{ inputs.parallelism }}"

          for P in "${PARALLELISM_VALUES[@]}"; do
            P=$(echo "$P" | tr -d ' ')
            echo ""
            echo "=== Parallelism: $P ==="
            mkdir -p "$RESULTS/p$P"

            for R in $(seq 1 ${{ inputs.runs }}); do
              echo "--- p$P run $R ---"

              export FELIX_RESOLVER_PARALLELISM="$P"
              export FELIX_SYSTEMBUNDLE_ACTIVATORS_START_PARALLELISM="$P"

              ant -buildfile "$GITHUB_WORKSPACE/script-runner" \
                -Dwebroot="$GITHUB_WORKSPACE" \
                -Dexecute="/hello.cfm" \
                -Ddebugger="false" \
                -DFlightRecording="true" \
                -DFlightRecordingSettings="$GITHUB_WORKSPACE/jfc-startup.jfc" \
                -DFlightRecordingFilename="$RESULTS/p$P/run$R.jfr" \
                -DpostCleanup="true" \
                -DluceeJar="$JAR" \
                > "$RESULTS/p$P/run$R.txt" 2>&1

              echo "  JFR: $(ls -lh "$RESULTS/p$P/run$R.jfr" 2>/dev/null | awk '{print $5}')"
            done
          done

      - name: Extract metrics
        shell: bash
        run: |
          RESULTS="$GITHUB_WORKSPACE/results/${{ matrix.jar.name }}"

          IFS=',' read -ra PARALLELISM_VALUES <<< "${{ inputs.parallelism }}"

          SUMMARY="$RESULTS/summary.md"
          echo "# Startup Profile: ${{ matrix.jar.name }}" > "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "**Java:** $(java -version 2>&1 | head -1)" >> "$SUMMARY"
          echo "**Runner:** $(nproc) cores" >> "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "| Parallelism | Run | Threads | Contention (ms) | SecureRandom (ms) | GC count | GC pause (ms) | Classes |" >> "$SUMMARY"
          echo "|---|---|---|---|---|---|---|---|" >> "$SUMMARY"

          for P in "${PARALLELISM_VALUES[@]}"; do
            P=$(echo "$P" | tr -d ' ')
            for R in $(seq 1 ${{ inputs.runs }}); do
              JFR="$RESULTS/p$P/run$R.jfr"
              if [ ! -f "$JFR" ]; then
                echo "MISSING: $JFR"
                continue
              fi

              THREADS=$(jfr summary "$JFR" 2>&1 | awk '/jdk.ThreadStart /{print $2}')
              CONTENTION=$(jfr print --events jdk.JavaMonitorEnter "$JFR" 2>&1 \
                | awk -F'= ' '/duration =/{gsub(/ ms/,"",$2); sum+=$2} END{printf "%.0f", sum}')
              SR=$(jfr print --events jdk.JavaMonitorEnter "$JFR" 2>&1 \
                | awk -F'= ' '/monitorClass =/{mc=$2} /duration =/{d=$2} /eventThread =/{if(mc ~ /HashDrbg/) {gsub(/ ms/,"",d); sum+=d}} END{printf "%.0f", sum}')
              GC_COUNT=$(jfr summary "$JFR" 2>&1 | awk '/jdk.GarbageCollection /{print $2}')
              GC_PAUSE=$(jfr print --events jdk.GCPhasePause "$JFR" 2>&1 \
                | awk -F'= ' '/duration =/{gsub(/ ms/,"",$2); sum+=$2} END{printf "%.1f", sum}')
              CLASSES=$(jfr summary "$JFR" 2>&1 | awk '/jdk.ClassLoad /{print $2}')

              echo "| $P | $R | $THREADS | $CONTENTION | $SR | $GC_COUNT | $GC_PAUSE | $CLASSES |" >> "$SUMMARY"
            done
          done

          echo "" >> "$SUMMARY"
          cat "$SUMMARY"

      - name: Post summary
        shell: bash
        run: cat "$GITHUB_WORKSPACE/results/${{ matrix.jar.name }}/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: startup-profile-${{ matrix.jar.name }}
          path: results/
